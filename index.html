<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סיפור בהפתעה</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0D47A1;
color:white;
text-align:center;
padding:16px;
}
h1{font-size:38px;}
.box{
background:white;
color:#111;
padding:18px;
border-radius:18px;
margin:15px auto;
max-width:800px;
font-size:20px;
line-height:1.7;
border:4px solid #111;
}
.story{font-size:21px;}
.question{font-size:26px;font-weight:bold;}
.timer{font-size:58px;font-weight:bold;margin:15px;}
button{
font-size:21px;
font-weight:bold;
padding:14px 24px;
border:none;
border-radius:14px;
margin:8px;
cursor:pointer;
}
.mainBtn{background:#FFD400;color:#111;}
.yesBtn{background:#4CAF50;color:white;}
.noBtn{background:#F44336;color:white;}
.hidden{display:none;}
</style>
</head>

<body>

<h1>📖 סיפור בהפתעה</h1>

<div class="box story" id="storyBox"></div>

<button class="mainBtn" id="startBtn" onclick="startQuestions()">
סיימנו לקרוא – התחילו שאלות
</button>

<div id="questionArea" class="hidden">
  <div class="timer" id="timer">00:00</div>
  <div class="box question" id="questionBox"></div>

  <button class="mainBtn" onclick="nextQuestion()">שאלה הבאה</button>
</div>

<div class="box hidden" id="finishBox"></div>

<script>
const stories = [
{
story:[
"ביום ראשון יצאו שלושה חברים לפארק הגדול.",
"נועה לבשה חולצה אדומה וכובע לבן.",
"יואב הביא תיק כחול ובתוכו חמישה כריכים.",
"על הדשא היה כדור צהוב ליד ספסל ירוק.",
"כלב קטן רץ ליד המזרקה ונבח פעמיים.",
"מאיה מצאה עפיפון סגול מתחת לעץ.",
"בסוף כולם ישבו ליד הגשר ואכלו ענבים."
],
questions:[
"כמה חברים יצאו לפארק?",
"איזה צבע הייתה החולצה של נועה?",
"כמה כריכים היו בתיק?",
"איפה היה הכדור הצהוב?",
"מה מאיה מצאה מתחת לעץ?"
]
},
{
story:[
"בבוקר שלישי נסעה משפחה קטנה לים.",
"אבא לקח שמשייה ירוקה ושתי מגבות.",
"אמא הביאה קופסה עם שמונה עוגיות.",
"הילדה דנה בנתה ארמון חול גבוה.",
"ליד הארמון היה דגל אדום קטן.",
"האח רועי מצא צדף לבן ומבריק.",
"בדרך חזרה כולם שתו מיץ תפוזים קר."
],
questions:[
"לאן נסעה המשפחה?",
"איזה צבע הייתה השמשייה?",
"כמה עוגיות היו בקופסה?",
"מי בנתה ארמון חול?",
"מה רועי מצא?"
]
},
{
story:[
"ביום חמישי הכיתה יצאה לטיול ביער.",
"המורה רונית חילקה לכל ילד מפה.",
"עידו ספר שבעה פרפרים ליד השביל.",
"תמר ראתה ציפור כחולה על ענף.",
"בתיק של אלון היה בקבוק מים גדול.",
"הקבוצה עצרה ליד סלע עגול למנוחה.",
"בסוף הטיול כולם שרו שיר באוטובוס."
],
questions:[
"לאן יצאה הכיתה?",
"מה חילקה המורה רונית?",
"כמה פרפרים עידו ספר?",
"איזה צבע הייתה הציפור?",
"איפה הקבוצה עצרה למנוחה?"
]
},
{
story:[
"בערב שבת הגיעו ילדים למסיבת יום הולדת.",
"החוגג איתן לבש חולצה כחולה.",
"על השולחן הייתה עוגה עם שש נרות.",
"סבתא הביאה בלונים בצבע צהוב.",
"החברים שיחקו משחק כיסאות מצחיק.",
"דניאל זכה במדבקה של כוכב כסף.",
"בסוף כולם קיבלו שקית הפתעות קטנה."
],
questions:[
"מי חגג יום הולדת?",
"איזה צבע הייתה החולצה של איתן?",
"כמה נרות היו על העוגה?",
"איזה צבע היו הבלונים?",
"מי זכה במדבקת כוכב?"
]
},
{
story:[
"בבוקר חורפי יצא גיא לקנות לחם.",
"הוא לקח מטרייה שחורה ונעליים אדומות.",
"במאפייה עמדו לפניו ארבעה אנשים.",
"המוכר נתן לו שלוש לחמניות חמות.",
"ליד הדלת ישב חתול אפור ושקט.",
"בחוץ ירד גשם חזק במשך דקות ארוכות.",
"גיא חזר הביתה ושם את הלחם בסל."
],
questions:[
"מה גיא יצא לקנות?",
"איזה צבע הייתה המטרייה?",
"כמה אנשים עמדו לפניו?",
"כמה לחמניות הוא קיבל?",
"איזה בעל חיים ישב ליד הדלת?"
]
},
{
story:[
"ביום שני נערכה תחרות ספורט בבית הספר.",
"עמית רץ ראשון במסלול הקצר.",
"ליה קפצה בחבל עשרים פעמים.",
"הקבוצה הירוקה הביאה דגל גדול.",
"המורה שרק במשרוקית בתחילת המשחק.",
"על השולחן חיכו מדליות זהב קטנות.",
"בסיום התחרות כולם מחאו כפיים לעמית."
],
questions:[
"איפה נערכה התחרות?",
"מי רץ ראשון?",
"כמה פעמים ליה קפצה בחבל?",
"איזה צבע הייתה הקבוצה עם הדגל?",
"מה חיכה על השולחן?"
]
},
{
story:[
"בצהריים נסעו ארבעה ילדים לספרייה העירונית.",
"הספרנית חנה קיבלה אותם בחיוך גדול.",
"רוני בחר ספר על דינוזאורים ירוקים.",
"יעל מצאה מחברת כחולה על כיסא.",
"על הקיר היה שעון עגול וישן.",
"הילדים ישבו ליד חלון גדול וקראו.",
"לפני שיצאו הם החזירו שני ספרים למדף."
],
questions:[
"כמה ילדים נסעו לספרייה?",
"מי קיבלה אותם בחיוך?",
"על מה היה הספר שרוני בחר?",
"איזה צבע הייתה המחברת?",
"כמה ספרים הם החזירו למדף?"
]
},
{
story:[
"בשבת בבוקר יצאו חברים לרכיבה באופניים.",
"אור רכב על אופניים אדומים חדשים.",
"נועה חבשה קסדה ורודה עם מדבקה.",
"על השביל הם ראו שלולית גדולה.",
"יובל עצר ליד עץ גבוה לשתות מים.",
"פתאום עבר לידם כלב עם רצועה כחולה.",
"בסוף הם הגיעו לגינה ואכלו בננות."
],
questions:[
"מה החברים עשו בשבת בבוקר?",
"איזה צבע היו האופניים של אור?",
"איזה צבע הייתה הקסדה של נועה?",
"איפה יובל עצר?",
"מה הם אכלו בסוף?"
]
},
{
story:[
"בערב קיץ התכנסה המשפחה לארוחת פיצה.",
"אמא הזמינה שתי פיצות גדולות.",
"אבא שם על השולחן בקבוק לימונדה.",
"נועה ביקשה חתיכה עם זיתים ירוקים.",
"עומר אכל שלושה משולשים במהירות.",
"הכלב ישב מתחת לשולחן וחיכה לפירור.",
"אחרי האוכל כולם שיחקו קלפים בסלון."
],
questions:[
"מה המשפחה אכלה?",
"כמה פיצות אמא הזמינה?",
"מה אבא שם על השולחן?",
"מי ביקשה פיצה עם זיתים?",
"כמה משולשים עומר אכל?"
]
},
{
story:[
"בבוקר יום שישי נערך שוק קטן בשכונה.",
"דוכן אחד מכר תפוחים אדומים ומתוקים.",
"ילדה בשם שירה קנתה שלושה בלונים.",
"הבלון הגדול ביותר היה בצבע סגול.",
"ליד הדוכן עמד נגן עם גיטרה.",
"איש מבוגר חילק מדבקות בצורת כוכב.",
"שירה חזרה הביתה עם סלסלה צהובה."
],
questions:[
"איפה נערך השוק?",
"מה מכר הדוכן הראשון?",
"כמה בלונים שירה קנתה?",
"איזה צבע היה הבלון הגדול?",
"עם מה שירה חזרה הביתה?"
]
}
];

let currentStory = stories[Math.floor(Math.random()*stories.length)];
let questionIndex = 0;
let seconds = 0;
let timer;

// תשובות קצרות לכל סיפור
const answers = [
["3 חברים","אדומה","5 כריכים","ליד הספסל הירוק","עפיפון סגול"],
["לים","ירוקה","8 עוגיות","דנה","צדף לבן ומבריק"],
["ליער","מפה","7 פרפרים","כחולה","ליד סלע עגול"],
["איתן","כחולה","6 נרות","צהובים","דניאל"],
["לחם","שחורה","4 אנשים","3 לחמניות","חתול אפור"],
["בבית הספר","עמית","20 פעמים","ירוקה","מדליות זהב"],
["4 ילדים","חנה","דינוזאורים ירוקים","כחולה","2 ספרים"],
["רכיבה באופניים","אדומים","ורודה","ליד עץ גבוה","בננות"],
["פיצה","2 פיצות","בקבוק לימונדה","נועה","3 משולשים"],
["בשכונה","תפוחים אדומים","3 בלונים","סגול","סלסלה צהובה"]
];

let questionOrder=[0,1,2,3,4].sort(()=>Math.random()-0.5);

document.getElementById("storyBox").innerHTML =
currentStory.story.join("<br>");

function startQuestions(){
document.getElementById("storyBox").classList.add("hidden");
document.getElementById("startBtn").classList.add("hidden");
document.getElementById("questionArea").classList.remove("hidden");

seconds = 0;
updateTimer();

timer = setInterval(()=>{
seconds++;
updateTimer();
},1000);

showQuestion();
}

function showQuestion(){
let idx=questionOrder[questionIndex];
document.getElementById("questionBox").innerHTML =
"שאלה "+(questionIndex+1)+":<br>"+currentStory.questions[idx]+
"<br><br><span style='color:green;font-size:20px;'>✅ תשובה: <strong>"+answers[stories.indexOf(currentStory)][idx]+"</strong></span>";
}

function nextQuestion(){
questionIndex++;

if(questionIndex >= 5){
clearInterval(timer);
document.getElementById("questionArea").classList.add("hidden");
document.getElementById("finishBox").classList.remove("hidden");
document.getElementById("finishBox").innerHTML =
"🏁 סיימתם!<br>זמן הקבוצה: <strong>" +
document.getElementById("timer").innerHTML +
"</strong><br><br>בדקו כמה תשובות נכונות עניתם.";
return;
}

showQuestion();
}

function updateTimer(){
let m = Math.floor(seconds/60);
let s = seconds%60;
document.getElementById("timer").innerHTML =
String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}
</script>

</body>
</html>
